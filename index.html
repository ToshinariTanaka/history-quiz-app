<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中学歴史一問一答</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>中学歴史一問一答</h1>
    <p class="subtitle">4択ではなく、まずは最小の一問一答モックアップです。</p>

    <section class="quiz-card">
      <p id="question">問題を読み込み中…</p>
      <div class="actions">
        <button id="show-answer" type="button">答えを見る</button>
        <button id="next" type="button">次の問題へ</button>
      </div>
      <p id="answer" class="answer hidden" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
